<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // SPA redirect for GitHub Pages: rewrites /path to /?p=/path
      // so index.html can pick it up via client-side router
      var path = window.location.pathname;
      window.location.replace(window.location.origin + '/?p=' + encodeURIComponent(path));
    </script>
  </head>
</html>
